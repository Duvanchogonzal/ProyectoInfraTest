services:
  backend: # Modificado de 'web' a 'backend'
    build: ./app
    container_name: app
    restart: always  # Se reinicia automáticamente si falla o el servidor se reinicia
    environment:
      - ENVIRONMENT=production
    
    # Limitación de recursos para estabilidad del servidor
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s   # Cada cuánto tiempo revisa
      timeout: 10s     # Cuánto espera la respuesta
      retries: 3       # Intentos antes de marcar error
      start_period: 5s # Tiempo de gracia para que la app arranque

    logging:
      driver: "json-file"
      options:
        max-size: "10mb" # El log se rota al llegar a 10MB
        max-file: "3"    # Solo guarda los últimos 3 archivos  

    expose:
      - "5000"

  nginx:
    image: nginx:latest
    container_name: proxy
    restart: always  # Se reinicia automáticamente
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend: # Ahora sí coincide con el nombre de arriba 
        condition: service_healthy # Espera a que el healthcheck de 'backend' sea exitoso
